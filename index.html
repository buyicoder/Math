<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>线性代数 · 第 1 课 · 向量 = 箭头</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <h1>线性代数 · 入门</h1>
        <p>从几何直观到抽象理解</p>
      </div>
      <div class="progress">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <span class="progress-text">1 / 8</span>
      </div>
    </header>

    <div class="lesson-tabs" id="lessonTabs">
      <button class="lesson-tab active" data-lesson-id="lesson1">
        第 1 课：向量 = 箭头
      </button>
      <button class="lesson-tab" data-lesson-id="lesson2">
        第 2 课：加法与数乘
      </button>
      <button class="lesson-tab" data-lesson-id="lesson3">
        第 3 课：线性组合与张成
      </button>
    </div>

    <main class="main">
      <section class="left-panel" id="lessonContent">
        <!-- 课程内容由 scripts/content.js + scripts/app.js 动态渲染 -->
      </section>

      <section class="right-panel">
        <div class="canvas-card">
          <div class="canvas-header">
            <h2 id="canvasTitle">拖动箭头，感受向量</h2>
            <p id="canvasSubtitle">从原点出发的箭头就是一个向量 v。</p>
          </div>
          <div class="canvas-wrapper">
            <div class="coeff-legend" id="coeffLegend">
              <div>a = <span id="legendA">1.0</span></div>
              <div>b = <span id="legendB">1.0</span></div>
            </div>
            <canvas id="vectorCanvas" width="480" height="360"></canvas>
          </div>
          <!-- 第 1 课使用的向量信息 -->
          <div class="vector-info" data-lesson-id="lesson1">
            <div>
              <span class="label">当前向量 v：</span>
              <span id="vecDisplay"></span>
            </div>
            <div>
              <span class="label">长度 |v|：</span>
              <span id="lenDisplay"></span>
            </div>
          </div>
          <!-- 第 2 课使用的控制区 -->
          <div class="vector-controls" data-lesson-id="lesson2" style="display: none;">
            <div class="vc-row">
              <div class="vc-block">
                <div class="vc-label">向量 u：</div>
                <div id="uDisplay"></div>
              </div>
              <div class="vc-block">
                <div class="vc-label">向量 v：</div>
                <div id="vDisplay"></div>
              </div>
            </div>
            <div class="vc-row sliders">
              <div class="vc-block">
                <div class="vc-label">系数 a（作用在 u 上）</div>
                <input type="range" id="aSlider" min="-3" max="3" step="0.1" value="1" />
                <div class="vc-value">a = <span id="aValue">1.0</span></div>
              </div>
              <div class="vc-block">
                <div class="vc-label">系数 b（作用在 v 上）</div>
                <input type="range" id="bSlider" min="-3" max="3" step="0.1" value="1" />
                <div class="vc-value">b = <span id="bValue">1.0</span></div>
              </div>
            </div>
            <div class="vc-row">
              <div class="vc-block">
                <div class="vc-label">线性组合 w = a·u + b·v：</div>
                <div id="wDisplay"></div>
              </div>
            </div>
          </div>

          <!-- 第 3 课使用的控制区 -->
          <div class="vector-controls" data-lesson-id="lesson3" style="display: none;">
            <div class="vc-row">
              <div class="vc-block">
                <div class="vc-label">向量 u：</div>
                <div id="l3uDisplay"></div>
              </div>
              <div class="vc-block">
                <div class="vc-label">向量 v：</div>
                <div id="l3vDisplay"></div>
              </div>
            </div>
            <div class="vc-row">
              <div class="vc-block">
                <div class="vc-label">模式选择</div>
                <div class="vc-mode-toggle">
                  <label><input type="radio" name="l3mode" value="u" checked /> 只用 u（Span{u}）</label>
                  <label><input type="radio" name="l3mode" value="uv" /> 用 u 和 v（Span{u, v}）</label>
                </div>
              </div>
            </div>
            <div class="vc-row">
              <div class="vc-block">
                <label class="vc-label">
                  显示可达区域（Span）：
                  <input type="checkbox" id="showSpanArea" checked />
                </label>
              </div>
            </div>
            <div class="vc-row">
              <div class="vc-block">
                <div class="vc-label">当前结论：</div>
                <p id="spanConclusion" class="vc-value">
                  Span{u} 是过原点的一条线。
                </p>
              </div>
            </div>
          </div>
          <div class="hint">
            提示：在坐标系中拖动箭头尖端（鼠标左键按住移动），看看 v 和 |v| 如何变化。
          </div>
        </div>

        <div class="quiz-card">
          <h2>小测：你真的理解了吗？</h2>
          <!-- 小测内容由 scripts/content.js + scripts/app.js 动态渲染 -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <button class="next-btn" disabled id="nextLessonBtn">
        ✅ 全部答对后，解锁第 2 课：向量的加法与数乘
      </button>
    </footer>
  </div>

  <script src="scripts/content.js"></script>
  <script src="scripts/lesson1.js"></script>
  <script src="scripts/lesson2.js"></script>
  <script src="scripts/lesson3.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
